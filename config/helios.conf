# helios.conf — Helios TCP Load Balancer configuration

bind_host  = 0.0.0.0
bind_port  = 8080
backlog    = 128
max_events = 64
algorithm  = round_robin   # round_robin | least_connections

health_interval_ms = 5000
health_timeout_ms  = 1000

[backend]
host = 127.0.0.1
port = 3001

[backend]
host = 127.0.0.1
port = 3002

[backend]
host = 127.0.0.1
port = 3003
